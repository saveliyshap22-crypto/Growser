name: Verify v0.3.2 release assets

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/verify-v0.3.2.yml

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Wait for and verify release
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $uri = 'https://api.github.com/repos/${{ github.repository }}/releases/tags/v0.3.2'
          $release = $null
          for ($attempt = 1; $attempt -le 60; $attempt++) {
            try {
              $candidate = Invoke-RestMethod -Uri $uri -Headers @{ Accept = 'application/vnd.github+json' }
              $names = @($candidate.assets | ForEach-Object name)
              $required = @(
                'ChromaBrowser-Setup-0.3.2-x64.exe',
                'ChromaBrowser-Setup-0.3.2-x64.exe.sha256',
                'ChromaBrowser-Portable-0.3.2-win-x64.zip',
                'ChromaBrowser-Portable-0.3.2-win-x64.zip.sha256',
                'ChromaBrowser-Android-0.3.2-preview.apk',
                'ChromaBrowser-Android-0.3.2-preview.apk.sha256'
              )
              $missing = @($required | Where-Object { $_ -notin $names })
              if (-not $candidate.draft -and -not $candidate.prerelease -and $missing.Count -eq 0) {
                $release = $candidate
                break
              }
            }
            catch {
              Write-Host "Release is not available yet (attempt $attempt)."
            }
            Start-Sleep -Seconds 10
          }

          if ($null -eq $release) {
            throw 'v0.3.2 release or required assets were not available before timeout.'
          }

          $assets = @{}
          foreach ($asset in $release.assets) {
            $assets[$asset.name] = $asset.size
          }
          $result = [ordered]@{
            tag = $release.tag_name
            name = $release.name
            html_url = $release.html_url
            draft = $release.draft
            prerelease = $release.prerelease
            published_at = $release.published_at
            assets = $assets
          }
          $result | ConvertTo-Json -Depth 5 | Set-Content '.release-verification-v0.3.2.json'

      - name: Commit verification result
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .release-verification-v0.3.2.json
          git commit -m "Verify release v0.3.2 assets"
          git push
