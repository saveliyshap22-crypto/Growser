name: Inspect v0.5.0 release assets

on:
  push:
    paths:
      - .github/workflows/inspect-v050-release.yml

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Record release metadata
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/v0.5.0" \
            | jq '{tag: .tag_name, name: .name, draft: .draft, prerelease: .prerelease, published_at: .published_at, html_url: .html_url, assets: (.assets | map({key: .name, value: .size}) | from_entries)}' \
            > .release-v050.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .release-v050.json
          git commit -m "Confirm Chroma Browser v0.5.0 assets" || true
          git pull --rebase origin main
          git push
