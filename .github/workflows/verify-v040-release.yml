name: Verify v0.4.0 release assets

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for release and verify assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/v0.4.0"
          for attempt in $(seq 1 90); do
            if curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "$api" > release.json; then
              count=$(jq '.assets | length' release.json)
              names=$(jq -r '.assets[].name' release.json)
              required=(
                "ChromaBrowser-Setup-0.4.0-x64.exe"
                "ChromaBrowser-Setup-0.4.0-x64.exe.sha256"
                "ChromaBrowser-Portable-0.4.0-win-x64.zip"
                "ChromaBrowser-Portable-0.4.0-win-x64.zip.sha256"
                "ChromaBrowser-Android-0.4.0-preview.apk"
                "ChromaBrowser-Android-0.4.0-preview.apk.sha256"
              )
              ok=true
              for name in "${required[@]}"; do
                grep -Fxq "$name" <<< "$names" || ok=false
              done
              if [[ "$count" -ge 6 && "$ok" == true ]]; then
                jq '{tag: .tag_name, name: .name, draft: .draft, prerelease: .prerelease, published_at: .published_at, html_url: .html_url, assets: (.assets | map({key: .name, value: .size}) | from_entries)}' release.json > .release-v040.json
                git config user.name "github-actions[bot]"
                git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                git add .release-v040.json
                git commit -m "Confirm Chroma Browser v0.4.0 release" || true
                git push
                exit 0
              fi
            fi
            sleep 10
          done
          echo "Release v0.4.0 or required assets were not available" >&2
          exit 1
