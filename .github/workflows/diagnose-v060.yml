name: Diagnose v0.6.0 build

on:
  push:
    paths:
      - .github/workflows/diagnose-v060.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/chroma-0.6.0-ui-audit
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Capture compiler diagnostics
        shell: pwsh
        run: |
          dotnet restore ChromaBrowser.sln
          $output = dotnet build ChromaBrowser.sln -c Release --no-restore 2>&1 | Out-String
          $lines = $output -split "`r?`n" | Where-Object { $_ -match 'error (CS|MC|XDG|NETSDK)|: error ' }
          if (-not $lines) { $lines = @('BUILD_OK') }
          $lines | Set-Content .build-errors-v060.txt
          $global:LASTEXITCODE = 0
      - name: Publish diagnostic result
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .build-errors-v060.txt
          git commit -m "Record v0.6.0 compiler diagnostics" || exit 0
          git push origin HEAD:agent/chroma-0.6.0-ui-audit
