name: Windows CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore
        run: dotnet restore ChromaBrowser.sln --locked-mode false -p:PublishReadyToRun=true

      - name: Build
        run: dotnet build ChromaBrowser.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/Chroma.Browser.Tests/Chroma.Browser.Tests.csproj -c Release --no-build --logger "trx;LogFileName=tests.trx"

      - name: Publish self-contained x64
        run: dotnet publish src/Chroma.Browser/Chroma.Browser.csproj -c Release -r win-x64 --self-contained true --no-restore -p:PublishReadyToRun=true -o artifacts/publish

      - name: Upload portable build
        uses: actions/upload-artifact@v4
        with:
          name: ChromaBrowser-win-x64
          path: artifacts/publish
          if-no-files-found: error

      - name: Upload tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults/*.trx"
          if-no-files-found: ignore
