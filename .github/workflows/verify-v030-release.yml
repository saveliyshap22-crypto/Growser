name: Verify v0.3.0 release assets

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    if: ${{ contains(github.event.head_commit.message, 'Verify v0.3.0 release assets') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify published release and required assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          required=(
            ChromaBrowser-Setup-0.3.0-x64.exe
            ChromaBrowser-Setup-0.3.0-x64.exe.sha256
            ChromaBrowser-Portable-0.3.0-win-x64.zip
            ChromaBrowser-Portable-0.3.0-win-x64.zip.sha256
            ChromaBrowser-Android-0.3.0-preview.apk
            ChromaBrowser-Android-0.3.0-preview.apk.sha256
          )

          release_json=""
          for attempt in $(seq 1 20); do
            if release_json=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/v0.3.0" 2>/dev/null); then
              break
            fi
            sleep 15
          done

          test -n "$release_json"
          RELEASE_JSON="$release_json" python - <<'PY'
          import json, os
          data = json.loads(os.environ["RELEASE_JSON"])
          required = {
              "ChromaBrowser-Setup-0.3.0-x64.exe",
              "ChromaBrowser-Setup-0.3.0-x64.exe.sha256",
              "ChromaBrowser-Portable-0.3.0-win-x64.zip",
              "ChromaBrowser-Portable-0.3.0-win-x64.zip.sha256",
              "ChromaBrowser-Android-0.3.0-preview.apk",
              "ChromaBrowser-Android-0.3.0-preview.apk.sha256",
          }
          assets = {item["name"]: item["size"] for item in data.get("assets", [])}
          missing = sorted(required - assets.keys())
          if data.get("draft") or data.get("prerelease") or missing:
              raise SystemExit(f"release verification failed: draft={data.get('draft')} prerelease={data.get('prerelease')} missing={missing}")
          result = {
              "tag": data.get("tag_name"),
              "name": data.get("name"),
              "published_at": data.get("published_at"),
              "html_url": data.get("html_url"),
              "draft": data.get("draft"),
              "prerelease": data.get("prerelease"),
              "assets": assets,
          }
          with open("release-v0.3.0-verified.json", "w", encoding="utf-8") as file:
              json.dump(result, file, ensure_ascii=False, indent=2, sort_keys=True)
              file.write("\n")
          PY

      - name: Commit verification marker
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release-v0.3.0-verified.json
          git commit -m "Verify Chroma Browser v0.3.0 release assets"
          git push origin HEAD:main
