name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version without v prefix"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize version
        shell: pwsh
        run: |
          $version = $env:VERSION.TrimStart('v')
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore, test and publish
        shell: pwsh
        run: |
          dotnet restore ChromaBrowser.sln -p:PublishReadyToRun=true
          dotnet test ChromaBrowser.sln -c Release --no-restore
          dotnet publish src/Chroma.Browser/Chroma.Browser.csproj -c Release -r win-x64 --self-contained true --no-restore -p:Version=$env:VERSION -p:FileVersion="$env:VERSION.0" -p:PublishReadyToRun=true -o artifacts/publish

      - name: Download official WebView2 bootstrapper
        shell: pwsh
        run: Invoke-WebRequest "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "installer/MicrosoftEdgeWebview2Setup.exe"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$env:VERSION" "installer\ChromaBrowser.iss"'

      - name: Create checksum
        shell: pwsh
        run: |
          $installer = Get-ChildItem artifacts/installer/ChromaBrowser-Setup-*-x64.exe | Select-Object -First 1
          $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content "$($installer.FullName).sha256" -NoNewline

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/installer/*.exe
            artifacts/installer/*.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChromaBrowser-Setup-${{ env.VERSION }}
          path: |
            artifacts/installer/*.exe
            artifacts/installer/*.sha256
          if-no-files-found: error
