name: Release

on:
  push:
    tags: ["v*"]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version without v prefix"
        required: true
        default: "0.6.0"

permissions:
  contents: read

jobs:
  windows:
    name: Package Windows
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || (github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, 'Release Chroma Browser v')) }}
    runs-on: windows-latest
    timeout-minutes: 50
    env:
      RAW_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event_name == 'workflow_dispatch' && inputs.version || '0.6.0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize version
        shell: pwsh
        run: |
          $version = $env:RAW_VERSION.TrimStart('v')
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore, build, test and publish
        shell: pwsh
        run: |
          dotnet restore ChromaBrowser.sln -p:PublishReadyToRun=true
          dotnet build ChromaBrowser.sln -c Release --no-restore -p:Version=$env:VERSION
          dotnet test tests/Chroma.Browser.Tests/Chroma.Browser.Tests.csproj -c Release --no-build --logger "trx;LogFileName=windows-release.trx"
          dotnet publish src/Chroma.Browser/Chroma.Browser.csproj -c Release -r win-x64 --self-contained true --no-restore -p:Version=$env:VERSION -p:FileVersion="$env:VERSION.0" -p:PublishReadyToRun=true -o artifacts/publish

      - name: Validate published application
        shell: pwsh
        run: |
          $exe = Get-Item "artifacts/publish/ChromaBrowser.exe"
          if ($exe.Length -lt 100000) { throw "Published executable is unexpectedly small" }
          if (-not $exe.VersionInfo.FileVersion.StartsWith($env:VERSION)) {
            throw "Unexpected file version: $($exe.VersionInfo.FileVersion)"
          }
          $required = @("ChromaBrowser.exe", "ChromaBrowser.dll", "Microsoft.Web.WebView2.Core.dll")
          foreach ($name in $required) {
            if (-not (Test-Path "artifacts/publish/$name")) { throw "Missing publish file: $name" }
          }

      - name: Download official WebView2 bootstrapper
        shell: pwsh
        run: Invoke-WebRequest "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "installer/MicrosoftEdgeWebview2Setup.exe"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer and portable archive
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$env:VERSION" "installer\ChromaBrowser.iss"
          New-Item -ItemType Directory -Force -Path artifacts/release | Out-Null
          Copy-Item "artifacts/installer/ChromaBrowser-Setup-$env:VERSION-x64.exe" artifacts/release/
          Compress-Archive -Path artifacts/publish/* -DestinationPath "artifacts/release/ChromaBrowser-Portable-$env:VERSION-win-x64.zip" -CompressionLevel Optimal
          Get-ChildItem artifacts/release -File | ForEach-Object {
            if ($_.Length -lt 1000000) { throw "Release file is unexpectedly small: $($_.Name)" }
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($_.Name)" | Set-Content "$($_.FullName).sha256" -NoNewline
          }

      - name: Upload Windows release files
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: artifacts/release
          if-no-files-found: error
          retention-days: 14

  android:
    name: Package Android preview
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || (github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, 'Release Chroma Browser v')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      RAW_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event_name == 'workflow_dispatch' && inputs.version || '0.6.0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize version
        shell: bash
        run: echo "VERSION=${RAW_VERSION#v}" >> "$GITHUB_ENV"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        shell: bash
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Test, lint and build installable APK
        run: gradle --project-dir android --no-daemon testDebugUnitTest lintDebug assembleDebug

      - name: Prepare Android release files
        shell: bash
        run: |
          mkdir -p artifacts/release
          target="ChromaBrowser-Android-${VERSION}-preview.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "artifacts/release/$target"
          test "$(stat -c%s "artifacts/release/$target")" -gt 100000
          cd artifacts/release
          sha256sum "$target" > "$target.sha256"

      - name: Upload Android release files
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: artifacts/release
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs: [windows, android]
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || (github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, 'Release Chroma Browser v')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RAW_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event_name == 'workflow_dispatch' && inputs.version || '0.6.0' }}

    steps:
      - name: Download verified packages
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Resolve release tag
        shell: bash
        run: |
          version="${RAW_VERSION#v}"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="$GITHUB_REF_NAME"
          else
            tag="v${version}"
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"

      - name: Validate release asset set
        shell: bash
        run: |
          test -f "release-assets/ChromaBrowser-Setup-${VERSION}-x64.exe"
          test -f "release-assets/ChromaBrowser-Portable-${VERSION}-win-x64.zip"
          test -f "release-assets/ChromaBrowser-Android-${VERSION}-preview.apk"
          test "$(find release-assets -maxdepth 1 -type f | wc -l)" -ge 6

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: Chroma Browser ${{ env.RELEASE_TAG }}
          body: |
            ## Chroma Browser 0.6.0

            Полный аудит интерфейса, настроек, курсора, медиапанели и установщика.

            - Исправлены белые системные контекстные меню, выпадающие списки и несогласованные поверхности.
            - Добавлены три формы интерфейса: скруглённая, сбалансированная и почти квадратная.
            - Добавлены усиленное стекло, мягкое стекло и полностью непрозрачный режим без стекла.
            - Добавлены системный курсор, белая точка с чёрной обводкой, чёрная точка с белой обводкой и радужная точка.
            - Пользовательский курсор применяется к нативному WPF-интерфейсу и страницам WebView2.
            - Добавлена отключаемая медиапанель слева от вкладок с названием, сайтом, паузой и управлением звуком.
            - Улучшены вкладки, активные состояния, анимации, обрезание длинного текста, AI-панель и адаптация к узким окнам.
            - Android получил синхронизированную графитово-оранжевую палитру, тёмные диалоги и обновлённые стеклянные поверхности.
            - Установщик переработан в стиле Chroma и дополнительно проверяет WebView2, обновление поверх старой версии и целостность пакетов.
            - Windows и Android версии синхронизированы до 0.6.0.
            - Для каждого пакета приложен SHA-256 файл.
          files: release-assets/*
